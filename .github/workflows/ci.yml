name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build -o /tmp/mem0-mcp-go ./cmd/mem0-mcp-go
